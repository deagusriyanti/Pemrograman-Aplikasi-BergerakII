name: fasum
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  cloud_firestore: ^6.3.0
  intl: ^0.20.2
  image_picker: ^1.2.1
  geolocator: ^14.0.2
  flutter_image_compress: ^2.4.0
  flutter_launcher_icons: ^0.14.4
  url_launcher: ^6.3.2
  shimmer: ^3.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/fasum_icon_512.png"
  min_sdk_android: 23

flutter:
  uses-material-design: true

assets:
  - assets/fasum_icon_512.png
  - assets/fasum_icon.png
